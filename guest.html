<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CJ스튜디오 게스트 신청</title>
<link rel="stylesheet" href="guest-style.css">
</head>
<body>
<main>
  <h1>🎧 CJ스튜디오 게스트 신청</h1>

  <section class="card">
    <div id="scheduleStatus" class="statusbox">신청 가능 시간을 확인하는 중입니다.</div>

    <h2>🎵 음악 신청</h2>
    <select id="requestMode">
      <option value="song">노래 제목·가수로 신청</option>
      <option value="lyrics">가사 키워드로 신청</option>
    </select>
    <p class="help">가사 키워드 신청을 선택하면 노래 제목과 가수는 입력하지 않아도 됩니다.</p>
    <input id="name" maxlength="30" placeholder="이름 또는 닉네임">
    <input id="song" maxlength="100" placeholder="노래 제목">
    <input id="artist" maxlength="100" placeholder="가수">
    <select id="keyword">
      <option value="">음악 키워드 선택</option>
      <option value="K-POP">K-POP</option>
      <option value="POP">POP</option>
      <option value="발라드">발라드</option>
      <option value="댄스">댄스</option>
      <option value="트로트">트로트</option>
    </select>
    <input id="lyricsKeywords" maxlength="100" placeholder="가사 키워드 최대 5개 (예: 사랑, 바다, 추억, 여름, 여행)">
    <p class="help">가사에 넣을 단어를 쉼표(,)로 구분해 최대 5개 입력하세요.</p>
    <textarea id="message" maxlength="200" placeholder="신청 사유 또는 전달할 말 (선택)"></textarea>
    <button id="submitBtn" disabled>게스트 신청하기</button>

    <p class="help">
      회원가입이나 로그인 없이 신청할 수 있습니다.
      신청 결과와 전체 신청 목록은 관리자만 확인합니다.
    </p>
  </section>

  <section class="card">
    <h2>📋 이 기기에서 신청한 곡</h2>
    <div id="guestList"></div>
  </section>
</main>

<script type="module" src="guest-app.js"></script>
</body>
</html>
