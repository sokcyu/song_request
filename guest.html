<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>CJ 게스트</title><link rel="stylesheet" href="guest-style.css"></head><body><main><h1>🎤 게스트 신청</h1><section class="card"><div id="schedule" class="statusbox"></div><input id="name" placeholder="이름/닉네임"><select id="mode"><option value="song">노래 제목·가수로 신청</option><option value="lyrics">가사 키워드로 신청</option></select><input id="song" placeholder="노래 제목"><input id="artist" placeholder="가수"><select id="genre"><option value="">장르 선택</option><option>K-POP</option><option>POP</option><option>발라드</option><option>댄스</option><option>힙합</option><option>R&B</option><option>록</option><option>트로트</option><option>EDM</option><option>재즈</option><option>클래식</option><option>인디</option><option>기타</option></select><input id="lyrics" placeholder="가사 키워드 최대 5개, 쉼표 구분"><textarea id="message" placeholder="전달할 말(선택)"></textarea><button id="submit" disabled>신청하기</button></section><section class="card"><h2>이 기기 신청내역</h2><div id="myList"></div></section><script type="module" src="guest-app.js"></script></main></body></html>
