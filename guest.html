<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#111827" />
  <title>ONYX MUSIC REMIX | 게스트 신청</title>
  <style>
    :root{
      --bg:#070b14; --card:#111827; --card2:#172033; --line:#2b3852;
      --text:#f8fafc; --muted:#a7b1c5; --accent:#8b5cf6; --accent2:#22d3ee;
      --ok:#22c55e; --wait:#f59e0b; --no:#ef4444;
    }
    *{box-sizing:border-box}
    body{
      margin:0; min-height:100vh; color:var(--text);
      font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;
      background:
        radial-gradient(circle at 15% 0%,rgba(139,92,246,.22),transparent 34%),
        radial-gradient(circle at 100% 20%,rgba(34,211,238,.16),transparent 30%),
        var(--bg);
    }
    button,input,select,textarea{font:inherit}
    .wrap{width:min(760px,100%);margin:auto;padding:24px 16px 54px}
    .hero{text-align:center;padding:18px 8px 12px}
    .logo{font-weight:900;letter-spacing:.08em;font-size:clamp(28px,7vw,48px)}
    .logo span{background:linear-gradient(90deg,var(--accent2),#fff,var(--accent));-webkit-background-clip:text;color:transparent}
    .sub{color:var(--muted);margin-top:8px}
    .card{
      margin-top:16px;padding:20px;border:1px solid var(--line);border-radius:22px;
      background:linear-gradient(180deg,rgba(23,32,51,.96),rgba(17,24,39,.96));
      box-shadow:0 20px 60px rgba(0,0,0,.28)
    }
    h2{font-size:20px;margin:0 0 16px}
    .grid{display:grid;gap:13px}
    .two{grid-template-columns:1fr 1fr}
    label{display:grid;gap:7px;font-size:14px;color:#d7deea}
    input,select,textarea{
      width:100%;border:1px solid var(--line);border-radius:13px;padding:13px 14px;
      color:var(--text);background:#0b1220;outline:none
    }
    input:focus,select:focus,textarea:focus{border-color:var(--accent2);box-shadow:0 0 0 3px rgba(34,211,238,.12)}
    textarea{min-height:88px;resize:vertical}
    .btnrow{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:15px}
    button{
      border:0;border-radius:14px;padding:13px 15px;font-weight:800;cursor:pointer
    }
    .primary{color:white;background:linear-gradient(90deg,var(--accent),#6d5dfc)}
    .secondary{color:white;background:#243047;border:1px solid #34435f}
    .ghost{color:#dbeafe;background:transparent;border:1px solid var(--line)}
    .hidden{display:none!important}
    .loginbox{text-align:center}
    .welcome{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}
    .welcome strong{font-size:18px}
    .hint{font-size:13px;color:var(--muted);line-height:1.55}
    .status-list{display:grid;gap:10px}
    .request{
      padding:15px;border:1px solid var(--line);border-radius:16px;background:#0b1220
    }
    .request-top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
    .song{font-weight:900;font-size:17px}.artist{color:var(--muted);margin-top:3px}
    .badge{white-space:nowrap;padding:6px 9px;border-radius:999px;font-size:12px;font-weight:900}
    .pending{background:rgba(245,158,11,.15);color:#fbbf24}
    .approved{background:rgba(34,197,94,.15);color:#4ade80}
    .rejected{background:rgba(239,68,68,.15);color:#f87171}
    .meta{color:var(--muted);font-size:12px;margin-top:10px;line-height:1.55}
    .reason{margin-top:8px;padding:9px 10px;border-radius:10px;background:rgba(239,68,68,.10);color:#fecaca;font-size:13px}
    .empty{text-align:center;padding:24px;color:var(--muted)}
    #qrBox{display:grid;place-items:center;min-height:190px;background:#fff;border-radius:16px;padding:14px}
    .footer{text-align:center;color:#6f7b91;font-size:12px;margin-top:22px}
    .toast{
      position:fixed;left:50%;bottom:24px;transform:translate(-50%,20px);
      background:#111827;color:#fff;border:1px solid var(--line);padding:11px 15px;
      border-radius:999px;opacity:0;pointer-events:none;transition:.25s;z-index:50
    }
    .toast.show{opacity:1;transform:translate(-50%,0)}
    @media(max-width:560px){.two,.btnrow{grid-template-columns:1fr}.wrap{padding-top:12px}.card{padding:17px}}
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <div class="logo">🎧 <span>ONYX MUSIC REMIX</span></div>
      <div class="sub">게스트 신청곡 접수</div>
    </section>

    <section id="loginCard" class="card loginbox">
      <h2>👤 게스트로 입장</h2>
      <p class="hint">회원가입 없이 닉네임만 입력하면 신청할 수 있습니다.</p>
      <label>
        닉네임
        <input id="nickname" maxlength="20" placeholder="예: 찬종" autocomplete="nickname" />
      </label>
      <button id="guestLoginBtn" class="primary" style="width:100%;margin-top:14px">게스트 로그인</button>
    </section>

    <section id="appArea" class="hidden">
      <section class="card">
        <div class="welcome">
          <div><strong id="welcomeName"></strong><div class="hint">게스트로 접속 중입니다.</div></div>
          <button id="logoutBtn" class="ghost">로그아웃</button>
        </div>

        <h2>🎵 노래 신청</h2>
        <form id="requestForm" class="grid">
          <div class="two grid">
            <label>노래 제목
              <input id="song" maxlength="80" required placeholder="노래 제목" />
            </label>
            <label>가수
              <input id="artist" maxlength="80" required placeholder="가수 이름" />
            </label>
          </div>

          <label>키워드
            <select id="keyword">
              <option>EDM</option><option>K-POP</option><option>POP</option>
              <option>댄스</option><option>발라드</option><option>트로트</option>
              <option>힙합</option><option>기타</option>
            </select>
          </label>

          <label>신청 메시지
            <textarea id="message" maxlength="200" placeholder="DJ 또는 룸 관리자에게 전달할 내용을 적어주세요."></textarea>
          </label>

          <button class="primary" type="submit">📩 신청하기</button>
          <div class="hint">동일한 노래와 가수는 10분 안에 중복 신청할 수 없습니다.</div>
        </form>
      </section>

      <section class="card">
        <h2>📋 내 신청 상태</h2>
        <div id="requestList" class="status-list"></div>
      </section>

      <section class="card">
        <h2>📲 링크 공유</h2>
        <div class="btnrow">
          <button id="shareBtn" class="primary">카카오톡·공유</button>
          <button id="copyBtn" class="secondary">링크 복사</button>
        </div>
        <div id="qrBox" style="margin-top:14px"></div>
        <p class="hint">현재 페이지 주소를 QR 코드로 표시합니다. GitHub Pages에 배포하면 배포 주소가 자동으로 들어갑니다.</p>
      </section>
    </section>

    <div class="footer">게스트는 신청만 가능하며 승인·거절·삭제는 관리자 전용입니다.</div>
  </main>

  <div id="toast" class="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script>
    (() => {
      "use strict";

      const STORAGE_KEY = "onyx_song_requests_v1";
      const USER_KEY = "onyx_guest_name";
      const loginCard = document.querySelector("#loginCard");
      const appArea = document.querySelector("#appArea");
      const nicknameInput = document.querySelector("#nickname");
      const welcomeName = document.querySelector("#welcomeName");
      const requestList = document.querySelector("#requestList");
      const toast = document.querySelector("#toast");

      const escapeHtml = (value = "") =>
        value.replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[ch]));

      function showToast(message) {
        toast.textContent = message;
        toast.classList.add("show");
        clearTimeout(showToast.timer);
        showToast.timer = setTimeout(() => toast.classList.remove("show"), 2200);
      }

      function getRequests() {
        try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
        catch { return []; }
      }

      function saveRequests(items) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
      }

      function currentUser() {
        return localStorage.getItem(USER_KEY) || "";
      }

      function enterApp(name) {
        localStorage.setItem(USER_KEY, name);
        welcomeName.textContent = `안녕하세요, ${name}님`;
        loginCard.classList.add("hidden");
        appArea.classList.remove("hidden");
        renderRequests();
        createQr();
      }

      function formatDate(iso) {
        return new Intl.DateTimeFormat("ko-KR", {
          dateStyle: "short", timeStyle: "short"
        }).format(new Date(iso));
      }

      function statusInfo(status) {
        if (status === "approved") return ["🟢 승인", "approved"];
        if (status === "rejected") return ["🔴 거절", "rejected"];
        return ["🟡 대기", "pending"];
      }

      function renderRequests() {
        const mine = getRequests()
          .filter(item => item.guest === currentUser())
          .sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));

        if (!mine.length) {
          requestList.innerHTML = '<div class="empty">아직 신청한 노래가 없습니다.</div>';
          return;
        }

        requestList.innerHTML = mine.map(item => {
          const [label, cls] = statusInfo(item.status);
          return `
            <article class="request">
              <div class="request-top">
                <div>
                  <div class="song">${escapeHtml(item.song)}</div>
                  <div class="artist">${escapeHtml(item.artist)}</div>
                </div>
                <span class="badge ${cls}">${label}</span>
              </div>
              <div class="meta">
                키워드: ${escapeHtml(item.keyword)}<br>
                신청: ${formatDate(item.createdAt)}
                ${item.message ? `<br>메시지: ${escapeHtml(item.message)}` : ""}
              </div>
              ${item.status === "rejected" && item.reason
                ? `<div class="reason">거절 사유: ${escapeHtml(item.reason)}</div>` : ""}
            </article>`;
        }).join("");
      }

      document.querySelector("#guestLoginBtn").addEventListener("click", () => {
        const name = nicknameInput.value.trim();
        if (name.length < 2) {
          showToast("닉네임을 2자 이상 입력해 주세요.");
          nicknameInput.focus();
          return;
        }
        enterApp(name);
      });

      nicknameInput.addEventListener("keydown", e => {
        if (e.key === "Enter") document.querySelector("#guestLoginBtn").click();
      });

      document.querySelector("#logoutBtn").addEventListener("click", () => {
        localStorage.removeItem(USER_KEY);
        appArea.classList.add("hidden");
        loginCard.classList.remove("hidden");
        nicknameInput.value = "";
      });

      document.querySelector("#requestForm").addEventListener("submit", e => {
        e.preventDefault();

        const song = document.querySelector("#song").value.trim();
        const artist = document.querySelector("#artist").value.trim();
        const keyword = document.querySelector("#keyword").value;
        const message = document.querySelector("#message").value.trim();
        const items = getRequests();
        const tenMinutesAgo = Date.now() - 10 * 60 * 1000;

        const duplicate = items.some(item =>
          item.song.toLowerCase() === song.toLowerCase() &&
          item.artist.toLowerCase() === artist.toLowerCase() &&
          new Date(item.createdAt).getTime() > tenMinutesAgo
        );

        if (duplicate) {
          showToast("같은 노래가 최근 10분 안에 신청되었습니다.");
          return;
        }

        items.push({
          id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now()),
          guest: currentUser(),
          song, artist, keyword, message,
          status: "pending",
          reason: "",
          createdAt: new Date().toISOString()
        });
        saveRequests(items);
        e.target.reset();
        renderRequests();
        showToast("신청곡이 접수되었습니다.");
      });

      async function sharePage() {
        const data = {
          title: "ONYX MUSIC REMIX 신청곡",
          text: "게스트 신청곡 페이지입니다.",
          url: location.href
        };
        try {
          if (navigator.share) await navigator.share(data);
          else {
            await navigator.clipboard.writeText(location.href);
            showToast("공유 링크를 복사했습니다.");
          }
        } catch (err) {
          if (err.name !== "AbortError") showToast("공유하지 못했습니다.");
        }
      }

      document.querySelector("#shareBtn").addEventListener("click", sharePage);
      document.querySelector("#copyBtn").addEventListener("click", async () => {
        try {
          await navigator.clipboard.writeText(location.href);
          showToast("링크를 복사했습니다.");
        } catch {
          showToast("주소창의 링크를 직접 복사해 주세요.");
        }
      });

      function createQr() {
        const box = document.querySelector("#qrBox");
        box.innerHTML = "";
        if (window.QRCode) {
          new QRCode(box, {
            text: location.href,
            width: 170,
            height: 170,
            correctLevel: QRCode.CorrectLevel.M
          });
        } else {
          box.textContent = "QR 코드를 불러오지 못했습니다.";
        }
      }

      // 같은 브라우저의 관리자 화면에서 상태를 변경하면 자동 반영됩니다.
      window.addEventListener("storage", event => {
        if (event.key === STORAGE_KEY) renderRequests();
      });

      const savedName = currentUser();
      if (savedName) enterApp(savedName);
    })();
  </script>
</body>
</html>
