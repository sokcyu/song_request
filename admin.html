<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>cj스튜디오 관리자 신청 프로그램</title>
<style>
*{box-sizing:border-box}body{margin:0;font-family:system-ui,"Noto Sans KR",sans-serif;background:#0b1020;color:#fff}
main{max-width:720px;margin:auto;padding:20px}.card{background:#151d31;border:1px solid #2d3955;border-radius:18px;padding:18px;margin-bottom:14px}
h1{text-align:center}h2{margin-top:0;font-size:19px}input,button{width:100%;padding:13px;margin-top:9px;border-radius:11px;font:inherit}
input{background:#0b1220;color:#fff;border:1px solid #354462}button{border:0;color:#fff;font-weight:800;cursor:pointer}
.primary{background:#7c3aed}.ok{background:#16a34a}.no{background:#dc2626}.yt{background:#e11d48}.del{background:#6b7280}
.hidden{display:none}.item{background:#0b1220;border:1px solid #33415e;border-radius:14px;padding:14px;margin-top:10px}
.song{font-size:18px;font-weight:900}.muted{color:#aab4c8;font-size:13px;margin-top:4px}.badge{display:inline-block;margin-top:8px;padding:5px 9px;border-radius:999px;background:#29364f}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:10px}.empty{text-align:center;color:#9ca3af;padding:20px}
</style>
</head>
<body>
<main>
<h1>🎧 cj스튜디오</h1>

<section id="login" class="card">
<h2>🔐 관리자 로그인</h2>
<input id="pw" type="password" placeholder="관리자 비밀번호">
<button id="loginBtn" class="primary">로그인</button>
<p class="muted">초기 비밀번호: 1234</p>
</section>

<section id="app" class="hidden">
<div class="card">
<h2>🎵 신청곡 직접 등록</h2>
<input id="name" placeholder="신청자 이름">
<input id="song" placeholder="노래 제목">
<input id="artist" placeholder="가수">
<button id="addBtn" class="primary">신청 등록</button>
</div>

<div class="card">
<h2>📋 신청 목록</h2>
<div id="list"></div>
</div>
</section>
</main>

<script>
const KEY="cj_simple_requests";
const PASSWORD="1234";
const $=s=>document.querySelector(s);

function items(){
  try{return JSON.parse(localStorage.getItem(KEY))||[]}catch{return[]}
}
function save(data){localStorage.setItem(KEY,JSON.stringify(data));render()}
function esc(v=""){return v.replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c]))}

$("#loginBtn").onclick=()=>{
  if($("#pw").value===PASSWORD){
    $("#login").classList.add("hidden");
    $("#app").classList.remove("hidden");
    render();
  }else alert("비밀번호가 틀렸습니다.");
};

$("#addBtn").onclick=()=>{
  const name=$("#name").value.trim();
  const song=$("#song").value.trim();
  const artist=$("#artist").value.trim();
  if(!name||!song||!artist){alert("모든 내용을 입력하세요.");return}
  const data=items();
  data.unshift({id:Date.now(),name,song,artist,status:"대기"});
  save(data);
  $("#song").value="";$("#artist").value="";
};

function update(id,status){
  const data=items();
  const target=data.find(x=>x.id===id);
  if(!target)return;

  target.status=status;

  if(status==="승인"){
    target.notice="승인되었습니다. 음원 발매 이후 공고문을 발송하겠습니다.";
  }else if(status==="거절"){
    target.notice="거절되었습니다. 다른 음원을 말씀해 주세요.";
  }

  save(data);
  alert(target.notice);
}

function removeItem(id){
  if(!confirm("삭제 처리할까요?"))return;

  const data=items();
  const target=data.find(x=>x.id===id);
  if(!target)return;

  target.status="삭제 처리";
  target.notice="음원이 부적절함으로 처리되어 삭제되었습니다. 다시 이용해 주시길 바랍니다.";
  target.deleted=true;

  save(data);
  alert(target.notice);
}
function youtube(song,artist){
  window.open("https://www.youtube.com/results?search_query="+encodeURIComponent(artist+" "+song),"_blank");
}
function render(){
  const data=items();
  $("#list").innerHTML=data.length?data.map(x=>`
  <div class="item">
    <div class="song">${esc(x.song)}</div>
    <div class="muted">${esc(x.artist)} · 신청자 ${esc(x.name)}</div>
    <span class="badge">${x.status}</span>
    ${x.notice ? `<div class="muted" style="margin-top:10px;padding:10px;background:#172033;border-radius:10px;color:#e5e7eb">📢 ${esc(x.notice)}</div>` : ""}
    <div class="actions">
      <button class="ok" onclick="update(${x.id},'승인')">✅ 승인</button>
      <button class="no" onclick="update(${x.id},'거절')">❌ 거절</button>
      <button class="yt" onclick="youtube('${esc(x.song)}','${esc(x.artist)}')">▶ 유튜브</button>
      <button class="del" onclick="removeItem(${x.id})">🗑 삭제 처리</button>
    </div>
  </div>`).join(""):'<div class="empty">신청곡이 없습니다.</div>';
}
</script>
</body>
</html>
