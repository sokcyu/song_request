<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CJ스튜디오 관리자</title>
<link rel="stylesheet" href="admin-style.css">
</head>
<body>
<main>
  <h1>🎛️ CJ스튜디오 관리자</h1>

  <section id="passwordView" class="card">
    <h2>🔐 관리자 비밀번호</h2>
    <input id="adminPassword" type="password" placeholder="관리자 비밀번호">
    <button id="passwordButton" class="primary">관리자 페이지 열기</button>
    <p class="help">초기 비밀번호: 1234</p>
  </section>

  <section id="appView" class="hidden">
    <section class="card topbar">
      <div>
        <strong>관리자 대시보드</strong>
        <div class="muted">비밀번호 인증 완료</div>
      </div>
      <button id="lockButton" class="secondary small">잠금</button>
    </section>

    <section class="card">
      <h2>⏰ 신청 접수 시간</h2>
      <div class="grid2">
        <label>시작 시간<input id="startTime" type="datetime-local"></label>
        <label>종료 시간<input id="endTime" type="datetime-local"></label>
      </div>
      <button id="saveSchedule" class="primary">예약시간 저장</button>
      <div class="grid2">
        <button id="openOneHour" class="ok">지금부터 1시간 접수</button>
        <button id="closeNow" class="no">즉시 마감</button>
      </div>
      <div id="scheduleStatus" class="statusbox">예약시간을 불러오는 중입니다.</div>
    </section>

    <section class="card">
      <h2>👥 이용자 관리</h2>
      <input id="userSearch" placeholder="이름 또는 이메일 검색">
      <div id="userList"></div>
    </section>

    <section class="card">
      <h2>🎵 신청곡 관리</h2>
      <div class="toolbar">
        <input id="requestSearch" placeholder="노래·가수·신청자 검색">
        <select id="requestFilter">
          <option value="all">전체 상태</option>
          <option value="pending">대기</option>
          <option value="approved">승인</option>
          <option value="rejected">거절</option>
          <option value="deleted">삭제 처리</option>
        </select>
      </div>
      <div id="requestList"></div>
    </section>
  </section>
</main>

<script>
const ADMIN_PASSWORD = "1234";
const passwordView = document.getElementById("passwordView");
const appView = document.getElementById("appView");
const passwordInput = document.getElementById("adminPassword");
const passwordButton = document.getElementById("passwordButton");
const lockButton = document.getElementById("lockButton");

function openAdmin() {
  if (passwordInput.value === ADMIN_PASSWORD) {
    sessionStorage.setItem("cj_admin_unlocked", "yes");
    passwordView.classList.add("hidden");
    appView.classList.remove("hidden");
    passwordInput.value = "";
  } else {
    alert("비밀번호가 올바르지 않습니다.");
  }
}

passwordButton.addEventListener("click", openAdmin);
passwordInput.addEventListener("keydown", e => {
  if (e.key === "Enter") openAdmin();
});

lockButton.addEventListener("click", () => {
  sessionStorage.removeItem("cj_admin_unlocked");
  appView.classList.add("hidden");
  passwordView.classList.remove("hidden");
});

if (sessionStorage.getItem("cj_admin_unlocked") === "yes") {
  passwordView.classList.add("hidden");
  appView.classList.remove("hidden");
}
</script>
<script type="module" src="admin-app.js"></script>
</body>
</html>
