<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>cj스튜디오 관리자</title><link rel="stylesheet" href="style.css"></head>
<body><main><h1>🎛️ cj스튜디오 관리자</h1>
<section id="login" class="card"><h2>🔐 관리자 로그인</h2><input id="email" type="email" placeholder="관리자 이메일"><input id="pw" type="password" placeholder="비밀번호"><button id="loginBtn" class="primary">로그인</button><p class="muted">첫 관리자는 README 안내에 따라 Firestore에서 role을 admin으로 설정하세요.</p></section>
<section id="app" class="hidden">
<section class="card"><div class="topbar"><strong>관리자 대시보드</strong><button id="logoutBtn" class="secondary">로그아웃</button></div></section>
<section class="card"><h2>👥 이용자 관리</h2><div id="users"></div></section>
<section class="card"><h2>⏰ 신청 예약시간</h2><div class="grid2"><input id="start" type="datetime-local"><input id="end" type="datetime-local"></div><button id="saveTime" class="primary">시간 저장</button><button id="openNow" class="ok">지금부터 1시간</button><button id="closeNow" class="no">즉시 마감</button><div id="scheduleStatus" class="statusbox"></div></section>
<section class="card"><h2>📋 신청곡 관리</h2><div id="requests"></div></section>
</section>
<script type="module" src="admin-app.js"></script></main></body></html>
