<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>cj스튜디오 관리자</title>
<style>
*{box-sizing:border-box}body{margin:0;font-family:system-ui,"Noto Sans KR",sans-serif;background:#0b1020;color:#fff}
main{max-width:820px;margin:auto;padding:20px}.card{background:#151d31;border:1px solid #2d3955;border-radius:18px;padding:18px;margin-bottom:14px}
h1{text-align:center}h2{margin-top:0;font-size:19px}input,select,button{width:100%;padding:13px;margin-top:9px;border-radius:11px;font:inherit}
input,select{background:#0b1220;color:#fff;border:1px solid #354462}button{border:0;color:#fff;font-weight:800;cursor:pointer}
.primary{background:#7c3aed}.ok{background:#16a34a}.no{background:#dc2626}.yt{background:#e11d48}.del{background:#6b7280}.secondary{background:#334155}
.hidden{display:none}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:9px}.statusbox{padding:14px;border-radius:14px;background:#0b1220;border:1px solid #33415e;margin-top:12px}
.item{background:#0b1220;border:1px solid #33415e;border-radius:14px;padding:14px;margin-top:10px}.song{font-size:18px;font-weight:900}
.muted{color:#aab4c8;font-size:13px;margin-top:4px;line-height:1.5}.badge{display:inline-block;margin-top:8px;padding:5px 9px;border-radius:999px;background:#29364f}
.notice{margin-top:10px;padding:10px;background:#172033;border-radius:10px}.actions{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:10px}
button:disabled{opacity:.38;cursor:not-allowed;filter:grayscale(1)}.empty{text-align:center;color:#9ca3af;padding:20px}
.counts{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}.count{text-align:center;padding:10px;background:#0b1220;border-radius:12px;border:1px solid #33415e}
.count strong{display:block;font-size:22px}.toolbar{display:grid;grid-template-columns:2fr 1fr;gap:8px}
@media(max-width:560px){.grid2,.toolbar,.actions{grid-template-columns:1fr}.counts{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<main>
<h1>🎧 cj스튜디오 관리자</h1>

<section id="login" class="card">
<h2>🔐 관리자 로그인</h2>
<input id="pw" type="password" placeholder="관리자 비밀번호">
<button id="loginBtn" class="primary">로그인</button>
<p class="muted">초기 비밀번호: 1234</p>
</section>

<section id="app" class="hidden">
<section class="card">
<h2>⏰ 신청 접수 예약시간 설정</h2>
<div class="grid2">
<label>시작 시간<input id="startTime" type="datetime-local"></label>
<label>종료 시간<input id="endTime" type="datetime-local"></label>
</div>
<button id="saveSchedule" class="primary">예약시간 저장</button>
<button id="openNow" class="ok">지금부터 1시간 접수</button>
<button id="closeNow" class="no">즉시 접수 마감</button>
<div id="scheduleStatus" class="statusbox"></div>
</section>

<section class="card">
<h2>📩 관리자 직접 신청곡 접수</h2>
<input id="name" placeholder="신청자 이름 또는 닉네임">
<input id="song" placeholder="노래 제목">
<input id="artist" placeholder="가수">
<select id="keyword">
<option>기타</option><option>EDM</option><option>K-POP</option><option>POP</option>
<option>댄스</option><option>발라드</option><option>트로트</option><option>힙합</option>
</select>
<button id="addBtn" class="primary">신청곡 접수하기</button>
</section>

<section class="card">
<h2>📋 신청 리스트</h2>
<div class="counts">
<div class="count"><span class="muted">전체</span><strong id="totalCount">0</strong></div>
<div class="count"><span class="muted">대기</span><strong id="waitCount">0</strong></div>
<div class="count"><span class="muted">승인</span><strong id="okCount">0</strong></div>
<div class="count"><span class="muted">거절</span><strong id="noCount">0</strong></div>
</div>
<div class="toolbar">
<input id="search" placeholder="노래, 가수, 신청자 검색">
<select id="filter"><option value="전체">전체 상태</option><option>대기</option><option>승인</option><option>거절</option><option>삭제 처리</option></select>
</div>
<div id="list"></div>
</section>
</section>
</main>

<script>
const KEY="cj_simple_requests";
const SCHEDULE_KEY="cj_request_schedule";
const PASSWORD="1234";
const $=s=>document.querySelector(s);

function items(){try{return JSON.parse(localStorage.getItem(KEY))||[]}catch{return[]}}
function save(data){localStorage.setItem(KEY,JSON.stringify(data));render()}
function getSchedule(){try{return JSON.parse(localStorage.getItem(SCHEDULE_KEY))||{}}catch{return{}}}
function esc(v=""){return String(v).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c]))}
function formatDate(v){return new Intl.DateTimeFormat("ko-KR",{dateStyle:"short",timeStyle:"short"}).format(new Date(v))}
function toLocalInput(d){const z=n=>String(n).padStart(2,"0");return `${d.getFullYear()}-${z(d.getMonth()+1)}-${z(d.getDate())}T${z(d.getHours())}:${z(d.getMinutes())}`}

$("#loginBtn").onclick=()=>{
 if($("#pw").value===PASSWORD){$("#login").classList.add("hidden");$("#app").classList.remove("hidden");loadSchedule();render()}
 else alert("비밀번호가 틀렸습니다.");
};

function loadSchedule(){
 const s=getSchedule();
 if(s.start)$("#startTime").value=s.start;
 if(s.end)$("#endTime").value=s.end;
 renderSchedule();
}
function renderSchedule(){
 const s=getSchedule(), now=Date.now();
 const box=$("#scheduleStatus");
 if(!s.start||!s.end){box.innerHTML="예약시간이 설정되지 않았습니다.";return}
 const start=new Date(s.start).getTime(), end=new Date(s.end).getTime();
 let state, detail;
 if(now<start){state="🟡 접수 준비 중";detail=`${formatDate(s.start)}부터 신청 가능`}
 else if(now<=end){state="🟢 접수 중";detail=`${formatDate(s.end)}까지 신청 가능`}
 else{state="🔴 접수 마감";detail=`${formatDate(s.end)}에 종료됨`}
 box.innerHTML=`<strong>${state}</strong><div class="muted">${detail}</div>`;
}
$("#saveSchedule").onclick=()=>{
 const start=$("#startTime").value,end=$("#endTime").value;
 if(!start||!end){alert("시작 시간과 종료 시간을 입력하세요.");return}
 if(new Date(end)<=new Date(start)){alert("종료 시간은 시작 시간보다 뒤여야 합니다.");return}
 localStorage.setItem(SCHEDULE_KEY,JSON.stringify({start,end}));
 renderSchedule();alert("예약시간이 저장되었습니다.");
};
$("#openNow").onclick=()=>{
 const now=new Date(), end=new Date(now.getTime()+60*60*1000);
 const s={start:toLocalInput(now),end:toLocalInput(end)};
 localStorage.setItem(SCHEDULE_KEY,JSON.stringify(s));loadSchedule();alert("지금부터 1시간 동안 접수합니다.");
};
$("#closeNow").onclick=()=>{
 const now=new Date(), before=new Date(now.getTime()-60*1000);
 const s={start:toLocalInput(before),end:toLocalInput(now)};
 localStorage.setItem(SCHEDULE_KEY,JSON.stringify(s));loadSchedule();alert("신청 접수를 마감했습니다.");
};

$("#addBtn").onclick=()=>{
 const name=$("#name").value.trim(),song=$("#song").value.trim(),artist=$("#artist").value.trim(),keyword=$("#keyword").value;
 if(!name||!song||!artist){alert("모든 내용을 입력하세요.");return}
 const data=items();
 data.unshift({id:Date.now(),name,song,artist,keyword,status:"대기",notice:"신청이 접수되었습니다. 관리자 확인을 기다려 주세요.",createdAt:new Date().toISOString()});
 save(data);$("#song").value="";$("#artist").value="";alert("신청곡이 접수되었습니다.");
};

function update(id,status){
 const data=items(),t=data.find(x=>x.id===id);if(!t)return;
 if(t.status!=="대기"){alert("이미 처리된 신청입니다.");return}
 t.status=status;t.updatedAt=new Date().toISOString();
 t.notice=status==="승인"?"승인되었습니다. 음원 발매 이후 공고문을 발송하겠습니다.":"거절되었습니다. 다른 음원을 말씀해 주세요.";
 save(data);alert(t.notice);
}
function removeItem(id){
 if(!confirm("삭제 처리할까요?"))return;
 const data=items(),t=data.find(x=>x.id===id);if(!t)return;
 t.status="삭제 처리";t.notice="음원이 부적절함으로 처리되어 삭제되었습니다. 다시 이용해 주시길 바랍니다.";save(data);alert(t.notice);
}
function youtube(song,artist){window.open("https://www.youtube.com/results?search_query="+encodeURIComponent(artist+" "+song),"_blank")}

function render(){
 const all=items();
 $("#totalCount").textContent=all.length;$("#waitCount").textContent=all.filter(x=>x.status==="대기").length;
 $("#okCount").textContent=all.filter(x=>x.status==="승인").length;$("#noCount").textContent=all.filter(x=>x.status==="거절").length;
 const q=$("#search").value.trim().toLowerCase(),f=$("#filter").value;
 const data=all.filter(x=>(!q||[x.name,x.song,x.artist,x.keyword].join(" ").toLowerCase().includes(q))&&(f==="전체"||x.status===f));
 $("#list").innerHTML=data.length?data.map(x=>`
 <div class="item"><div class="song">${esc(x.song)}</div>
 <div class="muted">${esc(x.artist)} · 신청자 ${esc(x.name)}<br>키워드: ${esc(x.keyword||"기타")}<br>접수: ${x.createdAt?formatDate(x.createdAt):"기록 없음"}</div>
 <span class="badge">${esc(x.status)}</span>${x.notice?`<div class="notice">📢 ${esc(x.notice)}</div>`:""}
 <div class="actions">
 <button class="ok" onclick="update(${x.id},'승인')" ${x.status!=="대기"?"disabled":""}>✅ 승인</button>
 <button class="no" onclick="update(${x.id},'거절')" ${x.status!=="대기"?"disabled":""}>❌ 거절</button>
 <button class="yt" onclick="youtube('${esc(x.song)}','${esc(x.artist)}')">▶ 유튜브</button>
 <button class="del" onclick="removeItem(${x.id})">🗑 삭제 처리</button>
 </div></div>`).join(""):'<div class="empty">신청곡이 없습니다.</div>';
}
$("#search").addEventListener("input",render);$("#filter").addEventListener("change",render);
setInterval(renderSchedule,1000);
</script>
</body>
</html>
