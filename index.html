<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>cj스튜디오 신청곡</title>
<style>
*{box-sizing:border-box}body{margin:0;font-family:system-ui,"Noto Sans KR",sans-serif;background:#0b1020;color:#fff}
main{max-width:680px;margin:auto;padding:20px}.card{background:#151d31;border:1px solid #2d3955;border-radius:18px;padding:18px;margin-bottom:14px}
h1{text-align:center}h2{margin-top:0;font-size:19px}input,button{width:100%;padding:13px;margin-top:9px;border-radius:11px;font:inherit}
input{background:#0b1220;color:#fff;border:1px solid #354462}button{border:0;color:#fff;font-weight:800;background:#7c3aed}
.item{background:#0b1220;border:1px solid #33415e;border-radius:14px;padding:14px;margin-top:10px}
.song{font-size:18px;font-weight:900}.muted{color:#aab4c8;font-size:13px;margin-top:4px}.badge{display:inline-block;margin-top:8px;padding:5px 9px;border-radius:999px;background:#29364f}
.notice{margin-top:10px;padding:10px;border-radius:10px;background:#172033;color:#e5e7eb}.empty{text-align:center;color:#9ca3af;padding:20px}
.share{background:#2563eb}
</style>
</head>
<body>
<main>
<h1>🎧 cj스튜디오</h1>

<section class="card">
<h2>🎵 신청곡 등록</h2>
<input id="name" placeholder="이름 또는 닉네임">
<input id="song" placeholder="노래 제목">
<input id="artist" placeholder="가수">
<button id="addBtn">신청하기</button>
<button id="shareBtn" class="share">링크 공유</button>
</section>

<section class="card">
<h2>📋 내 신청 상태</h2>
<div id="list"></div>
</section>
</main>

<script>
const KEY="cj_simple_requests";
const USER_KEY="cj_simple_user";
const $=s=>document.querySelector(s);

function items(){
  try{return JSON.parse(localStorage.getItem(KEY))||[]}catch{return[]}
}
function save(data){localStorage.setItem(KEY,JSON.stringify(data));render()}
function esc(v=""){return v.replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c]))}

$("#addBtn").onclick=()=>{
  const name=$("#name").value.trim();
  const song=$("#song").value.trim();
  const artist=$("#artist").value.trim();
  if(!name||!song||!artist){alert("모든 내용을 입력하세요.");return}
  localStorage.setItem(USER_KEY,name);
  const data=items();
  data.unshift({id:Date.now(),name,song,artist,status:"대기",notice:"신청이 접수되었습니다. 관리자 확인을 기다려 주세요."});
  save(data);
  $("#song").value="";$("#artist").value="";
  alert("신청되었습니다.");
};

$("#shareBtn").onclick=async()=>{
  const data={title:"cj스튜디오 신청곡",text:"신청곡 페이지입니다.",url:location.href};
  try{
    if(navigator.share) await navigator.share(data);
    else{await navigator.clipboard.writeText(location.href);alert("링크를 복사했습니다.");}
  }catch{}
};

function render(){
  const user=localStorage.getItem(USER_KEY)||"";
  const data=items().filter(x=>!user||x.name===user);
  $("#list").innerHTML=data.length?data.map(x=>`
  <div class="item">
    <div class="song">${esc(x.song)}</div>
    <div class="muted">${esc(x.artist)} · 신청자 ${esc(x.name)}</div>
    <span class="badge">${esc(x.status)}</span>
    ${x.notice?`<div class="notice">📢 ${esc(x.notice)}</div>`:""}
  </div>`).join(""):'<div class="empty">신청곡이 없습니다.</div>';
}
window.addEventListener("storage",e=>{if(e.key===KEY)render()});
render();
</script>
</body>
</html>
