<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>CJ 이용자</title><link rel="stylesheet" href="user-style.css"></head><body><main>
<h1>🎧 CJ스튜디오 이용자</h1>
<section id="auth" class="card">
<h2>회원 로그인</h2><input id="loginId" placeholder="아이디"><input id="loginPw" type="password" placeholder="비밀번호"><button id="loginBtn">로그인</button>
<hr><h2>회원 등록</h2><input id="name" placeholder="이름"><input id="regId" placeholder="아이디"><input id="regPw" type="password" placeholder="비밀번호"><input id="phone" placeholder="휴대폰번호(선택)"><input id="email" placeholder="이메일(선택)"><button id="regBtn">가입 승인 요청</button><div id="authMsg" class="notice hidden"></div>
</section>
<section id="app" class="hidden">
<section class="card topbar"><div><strong id="welcome"></strong><div id="memberId" class="muted"></div></div><button id="logout" class="secondary small">로그아웃</button></section>
<section class="card"><div id="schedule" class="statusbox"></div><h2>음악 신청</h2>
<select id="mode"><option value="song">노래 제목·가수로 신청</option><option value="lyrics">가사 키워드로 신청</option></select>
<input id="song" placeholder="노래 제목"><input id="artist" placeholder="가수">
<select id="genre"><option value="">장르 선택</option><option>K-POP</option><option>POP</option><option>발라드</option><option>댄스</option><option>힙합</option><option>R&B</option><option>록</option><option>트로트</option><option>EDM</option><option>재즈</option><option>클래식</option><option>인디</option><option>기타</option></select>
<input id="lyrics" placeholder="가사 키워드 최대 5개, 쉼표 구분"><textarea id="message" placeholder="전달할 말(선택)"></textarea><button id="submit" disabled>신청하기</button></section>
<section class="card"><h2>내 신청곡</h2><div id="myList"></div></section></section>
<script type="module" src="member-app.js"></script></main></body></html>
